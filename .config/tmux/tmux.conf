# Prefix
#set-option -g prefix C-z

# Reload tmux.conf
bind C-r source-file ~/.config/tmux/tmux.conf

set -g default-shell $SHELL

# http://blog.monochromegane.com/blog/2013/12/12/tmux-no-prefix/
bind -n S-up select-pane -U
bind -n S-down select-pane -D
bind -n S-left select-pane -L
bind -n S-right select-pane -R

# vim-like
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

set -g status-interval 10

# Set statusbar colors
set -g status-bg colour9
setw -g window-status-current-style bg="white",fg="black"

# Enable mouse
set -g mouse on
bind -n WheelUpPane {
    if -F '#{==:#{window_name},nvim}' {
        send-keys -M 
    } {
        copy-mode -e 
    }
}
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Enable vi keybindings in copy mode
setw -g mode-keys vi

# Ensure system clipboard support is enabled
set-option -g set-clipboard on

# https://gist.github.com/bbqtd/a4ac060d6f6b9ea6fe3aabe735aa9d95
set-option default-terminal "tmux-256color"

